server:
  port: 8889

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://test.zopx.top:13306/test?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: JKLjkl789**..
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 配置初始化大小、最小、最大
      max-active: 20
      initial-size: 5
      min-idle: 2
      # 配置获取连接等待超时的时间
      max-wait: 6000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 600000
      max-evictable-idle-time-millis: 900000
      validation-query: select 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      keep-alive: true
      phy-max-use-count: 1000

  redis:
    host: test.zopx.top
    port: 16379
  application:
    name: goku-example-web

  messages:
    basename: i18n/messages
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB


mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: 'is_delete'
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id
    banner: false
  configuration:
    lazy-loading-enabled: true
    map-underscore-to-camel-case: true
    cache-enabled: true
  type-aliases-package: top.zopx.goku.example.**.entity

goku:
  mysql:
    binlog:
      host: test.zopx.top
      port: 13306
      username: ${spring.datasource.username}
      password: ${spring.datasource.password}
  log:
    level: info
    lasting: true
    
